services:
  tasklist-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasklist-frontend
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    restart: unless-stopped
